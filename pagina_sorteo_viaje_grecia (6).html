<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sorteo Viaje a Grecia</title>
<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:0;
  background-image:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA...PLACEHOLDER...");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.overlay{
  background:rgba(255,255,255,0.85);
  min-height:100vh;
  padding-top:100px;
}

h1{
  color:#333;
}

.card{
  background:white;
  padding:40px;
  border-radius:10px;
  width:320px;
  margin:auto;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.countdown{
  margin-top:20px;
  font-size:20px;
}

.winner{
  display:none;
  font-size:28px;
  margin-top:20px;
  color:#2e7d32;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="overlay">

<div class="card">

<h1>🇬🇷 Sorteo Viaje a Grecia</h1>

<p>Ayúdanos a financiar nuestro viaje de final de curso.</p>

<div class="countdown" id="countdown">
Tiempo restante:<br>
<span id="time"></span>
</div>

<div class="winner" id="winner">
🎉 Número ganador: 1910
</div>

<p style="margin-top:20px;">
✈️ Viaje para dos personas a Grecia<br>
🏨 4 noches en hotel en Atenas<br>
🏛️ Visita a la Acrópolis
</p>

<p style="margin-top:20px;font-weight:bold;">
🎟️ Papeletas: 1 por 3€ • 2 por 5€
</p>

</div>

</div>

<script>

const startDate = new Date();
const threeMonths = 1000*60*60*24*90;
const endDate = new Date(startDate.getTime()+threeMonths);

function updateCountdown(){

const now = new Date();
const diff = endDate-now;

if(diff<=0){

document.getElementById("countdown").style.display="none";
document.getElementById("winner").style.display="block";
return;

}

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

const text = days+"d "+hours+"h "+minutes+"m "+seconds+"s";

document.getElementById("time").textContent=text;
}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
